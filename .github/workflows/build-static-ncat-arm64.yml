name: Build Static ncat for ARM64

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-static-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build ncat in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/build -w /build \
            ubuntu:22.04 \
            bash -c "
              set -ex
              apt-get update
              apt-get install -y \
                build-essential libssl-dev libpcap-dev libpcre3-dev \
                liblua5.3-dev zlib1g-dev autoconf automake libtool \
                pkg-config flex bison

              ./configure \
                --enable-static --disable-shared \
                --without-nmap --without-ndiff --without-zenmap --without-nping \
                LDFLAGS='-static -no-pie'

              make -j\$(nproc) ncat

              # 确认生成
              file ncat/ncat || (echo 'ncat not found' && exit 1)
              ldd ncat/ncat 2>/dev/null || echo 'Static build'
            "

      - name: Debug file structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents of ./ncat:"
          ls -la ncat/ || echo "ncat/ does not exist"
          echo "Search for any file named 'ncat':"
          find . -name ncat -type f -exec ls -la {} \;

      - name: Upload ncat binary
        uses: actions/upload-artifact@v4
        with:
          name: ncat-static-arm64
          # 使用通配符匹配所有名为 ncat 的可执行文件（不会出错）
          path: |
            **/ncat
          # 如果还是找不到，就明确失败
          if-no-files-found: error
