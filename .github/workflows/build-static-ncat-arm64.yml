name: Build Fully Static ncat for ARM64

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-static-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build static ncat with compiled static libs
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/build -w /build \
            ubuntu:22.04 \
            bash -c "
              set -ex

              # 安装编译工具及系统库（openssl 和 zlib 使用系统静态库）
              apt-get update
              apt-get install -y \
                build-essential autoconf automake libtool pkg-config \
                flex bison wget \
                libssl-dev zlib1g-dev

              # ============================================
              # 1. 编译 libpcap 静态库
              # ============================================
              cd /tmp
              wget -q https://www.tcpdump.org/release/libpcap-1.10.5.tar.gz
              tar -xzf libpcap-1.10.5.tar.gz
              cd libpcap-1.10.5
              ./configure --enable-static --disable-shared --prefix=/usr
              make -j\$(nproc)
              make install

              # ============================================
              # 2. 编译 Lua 静态库（只编译库，不编译主程序，避免 readline 依赖）
              # ============================================
              cd /tmp
              wget -q https://www.lua.org/ftp/lua-5.3.6.tar.gz
              tar -xzf lua-5.3.6.tar.gz
              cd lua-5.3.6/src
              # 直接编译 liblua.a（不依赖 readline）
              make liblua.a
              cp liblua.a /usr/lib/
              cp *.h /usr/include/

              # ============================================
              # 3. 编译 PCRE 静态库
              # ============================================
              cd /tmp
              wget -q https://sourceforge.net/projects/pcre/files/pcre/8.45/pcre-8.45.tar.gz
              tar -xzf pcre-8.45.tar.gz
              cd pcre-8.45
              ./configure --enable-static --disable-shared --prefix=/usr \
                --disable-cpp --enable-utf8
              make -j\$(nproc)
              make install

              # ============================================
              # 4. 编译 ncat（静态链接所有库）
              # ============================================
              cd /build

              ./configure \
                --enable-static \
                --disable-shared \
                --without-nmap \
                --without-ndiff \
                --without-zenmap \
                --without-nping \
                CPPFLAGS=\"-I/usr/include\" \
                LDFLAGS=\"-static -no-pie -L/usr/lib -lpcap -llua -lpcre -lssl -lcrypto -lz -lm -ldl -lpthread\"

              cd ncat
              make -j\$(nproc)

              # 验证产物
              cd ..
              if [ ! -f ncat/ncat ]; then
                echo \"ERROR: ncat/ncat not found\"
                exit 1
              fi

              echo \"=== 编译成功 ===\"
              file ncat/ncat
              ldd ncat/ncat 2>/dev/null && echo \"⚠️ 警告：动态链接\" || echo \"✅ 完全静态，无任何动态依赖\"
            "

      - name: Upload static ncat binary
        uses: actions/upload-artifact@v4
        with:
          name: ncat-static-arm64
          path: ncat/ncat
          if-no-files-found: error
