name: Build Fully Static ncat for ARM64 (Alpine)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:    # 允许手动触发

jobs:
  build-static-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 安装 QEMU 用户态模拟，让 x86_64 runner 可以运行 ARM64 容器
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build static ncat in Alpine ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/build -w /build \
            alpine:3.19 \
            sh -c "
              set -ex

              # 安装编译工具及所有必需的静态库（Alpine 的 apk 提供 .a 文件）
              apk add --no-cache \
                build-base \
                autoconf \
                automake \
                libtool \
                pkgconfig \
                flex \
                bison \
                openssl-dev \
                openssl-libs-static \
                libpcap-dev \
                libpcap-static \
                pcre-dev \
                pcre-static \
                lua5.3-dev \
                lua5.3-static \
                zlib-dev \
                zlib-static

              # 配置：启用静态链接，禁用共享库，仅构建 ncat（跳过其他组件）
              ./configure \
                --enable-static \
                --disable-shared \
                --without-nmap \
                --without-ndiff \
                --without-zenmap \
                --without-nping \
                LDFLAGS=\"-static -no-pie\"

              # ★ 关键修正：直接进入 ncat 子目录进行编译（而非根目录的 make ncat）
              cd ncat
              make -j\$(nproc)

              # 返回项目根目录，验证产物是否存在
              cd ..
              if [ ! -f ncat/ncat ]; then
                echo \"ERROR: ncat/ncat not found after build\"
                find . -name ncat -type f || true
                exit 1
              fi

              # 显示文件信息，确认静态编译
              file ncat/ncat
              ldd ncat/ncat 2>/dev/null && echo \"⚠️ 警告：二进制是动态链接的\" || echo \"✅ 静态编译成功，无动态依赖\"
            "

      # 调试（可选）：列出生成的文件，便于排查
      - name: Debug binary info
        run: |
          ls -la ncat/ncat
          file ncat/ncat || true

      # 上传产物
      - name: Upload static ncat binary
        uses: actions/upload-artifact@v4
        with:
          name: ncat-static-arm64
          path: ncat/ncat          # 明确指定二进制文件
          if-no-files-found: error # 若文件不存在则使工作流失败
